version: '3.8'

services:
  backend:
    build: ./backend
    container_name: vortex_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: vortex_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
